# Антислова — відфільтровують нерелевантний контент
#
# УВАГА: не додавати слова, які є в корупційних/кримінально-політичних статтях
# (fraud, bribery тощо) — вони потраплять під penalty і спричинять хибне відхилення.
#
# category_overrides дозволяє підвищити reject_threshold для певних категорій,
# де перетин з негативними словами є структурним (наприклад, cross_border_crime).

penalty: 0.20 # per-hit penalty (зменшено з 0.35 — було надто агресивним)
reject_threshold: 2 # >= N hits → score 0.0

# Виняток для категорій (підвищений поріг)
category_overrides:
  8: # cross_border_crime
    reject_threshold: 4

